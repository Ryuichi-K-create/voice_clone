# 使用エンジンのデフォルト（UIで切替可能）
engine: "qwen3_tts"    # qwen3_tts | gpt_sovits

model:
  name: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
  device: "auto"       # auto: CUDA → MPS → CPU の順で自動選択
  dtype: "auto"        # auto: CUDA=bfloat16, MPS/CPU=float32

# GPT-SoVITS 設定（subprocess 経由で別 venv の python を呼ぶ）
gpt_sovits:
  device: "auto"       # auto / cuda / mps / cpu
  version: "v2"        # v1 / v2 / v3 / v4 / v2Pro / v2ProPlus
  text_split_method: "cut5"   # cut0(無分割) / cut1(4文ごと) / cut5(句読点) など
  python_executable: ""       # 空欄なら GPT-SoVITS/.venv_sovits/bin/python を自動選択

whisper:
  model_size: "large-v3"
  device: "auto"       # auto: CUDA → CPU（faster-whisperはMPS非対応）
  compute_type: "auto"  # auto: CUDA=float16, CPU=float32

audio:
  sample_rate: 16000
  min_duration_sec: 3.0
  max_duration_sec: 30.0

generation:
  max_new_tokens: 2048
  chunk_max_chars: 100

finetune:
  default_batch_size: 4
  default_lr: 2.0e-5
  default_epochs: 5
  default_grad_accum: 4

paths:
  prompts_dir: "models"
  sovits_prompts_dir: "models/sovits"   # GPT-SoVITS 用 prompt 保存先（参照音声+テキスト）
  output_dir: "output"
  ft_output_dir: "ft_output"
  ft_data_dir: "ft_data"
  ffmpeg_dir: ""   # 空欄ならシステム PATH の ffmpeg を使用（Windows で WinGet 等の固定パスを使う場合のみ指定）

server:
  host: "0.0.0.0"
  port: 7860
